name: Deploy Backend Prod

on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - backend/**
  #     - gateway/**
  #     - ops/**
  #     - .github/workflows/reusable-deploy-backend.yml
  #     - .github/workflows/deploy-backend-prod.yml

  workflow_dispatch:

concurrency:
  group: deploy-backend-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-branch:
    name: Validate main branch
    runs-on: ubuntu-latest

    steps:
      - name: Check branch
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Prod 배포는 main 브랜치에서만 실행할 수 있습니다."
            exit 1
          fi

  deploy:
    uses: ./.github/workflows/reusable-deploy-backend.yml
    with:
      environment: prod
      dockerfile_name: Dockerfile.prod
      runner_label: mah-prod-vm
    secrets: inherit
