name: Deploy Frontend Dev

on:
  push:
    branches:
      - develop
    paths:
      - frontend/**
      - .github/workflows/reusable-deploy-frontend.yml
      - .github/workflows/deploy-frontend-dev.yml

  workflow_dispatch:

concurrency:
  group: deploy-frontend-dev
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-branch:
    name: Validate develop branch
    runs-on: ubuntu-latest

    steps:
      - name: Check branch
        run: |
          if [ "$GITHUB_REF_NAME" != "develop" ]; then
            echo "Dev 배포는 develop 브랜치에서만 실행할 수 있습니다."
            exit 1
          fi

  deploy:
    uses: ./.github/workflows/reusable-deploy-frontend-swa.yml
    with:
      environment: dev
      build_command: npm run build:dev
      app_location: frontend/dist