name: Reusable Deploy Frontend SWA

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      build_command:
        required: true
        type: string
      app_location:
        required: false
        type: string
        default: frontend/dist

permissions:
  contents: read

jobs:

  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify SWA deployment context
        env:
          SWA_TOKEN: ${{ secrets.SWA_TOKEN }}
        run: |
          set -e

          echo "Environment input: '${{ inputs.environment }}'"

          if [ -z "$SWA_TOKEN" ]; then
            echo "::error::SWA_TOKEN is empty in environment '${{ inputs.environment }}'"
            exit 1
          fi

          echo "SWA_TOKEN is available"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: ${{ inputs.build_command }}
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_WS_BASE_URL: ${{ vars.WS_BASE_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ inputs.app_location }}
          skip_app_build: true