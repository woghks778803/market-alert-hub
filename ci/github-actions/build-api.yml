# 백엔드 이미지 빌드→ECR
name: build-api
on:
  push:
    branches: [main]
    paths:
      - "backend/api/**"
      - "infra/ecs/api-taskdef.json"
      - "!backend/compose/**"
      - "!docs/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push
        id: bp
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/mah-api"
          TAG="main-${{ github.sha }}"  # 필요시 semver/tag 전략 교체
          docker build -t "$IMAGE:$TAG" backend/api
          docker push "$IMAGE:$TAG"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG"     >> $GITHUB_OUTPUT

    outputs:
      image: ${{ steps.bp.outputs.image }}
      tag: ${{ steps.bp.outputs.tag }}
