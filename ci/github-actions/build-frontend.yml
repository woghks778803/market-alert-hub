# 프론트 빌드→아티팩트/정적 배포 이미지
name: build-frontend
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "infra/ecs/frontend-taskdef.json"
      - "!backend/**"
      - "!docs/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - name: Build & Push (Nginx + built dist)
        id: bp
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/mah-frontend"
          TAG="main-${{ github.sha }}"
          docker build -f frontend/Dockerfile -t "$IMAGE:$TAG" frontend
          docker push "$IMAGE:$TAG"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG"     >> $GITHUB_OUTPUT
    outputs:
      image: ${{ steps.bp.outputs.image }}
      tag: ${{ steps.bp.outputs.tag }}
