name: mah-dev

services:
  gateway:
    build: ../../gateway
    container_name: mah_gateway
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_started
    environment:
      - TZ=${TZ:-Asia/Seoul}
    restart: unless-stopped
    networks: [mahnet]

  api:
    build: ../../backend/api
    container_name: mah_api
    working_dir: /app
    volumes:
      - ../../backend/api:/app:cached
    command: ["/app/entrypoint.sh"]
    expose: ["8000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - TZ=${TZ:-Asia/Seoul}
      - MYSQL_HOST=${MYSQL_HOST:-db}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-mah}
      - MYSQL_USER=${MYSQL_USER:-mah}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-mahpass}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET:-devsecret}
      - JWT_ACCESS_MINUTES=${JWT_ACCESS_MINUTES:-15}
      - JWT_REFRESH_DAYS=${JWT_REFRESH_DAYS:-7}
      - RUN_ALEMBIC=${RUN_ALEMBIC:-0}
      - WATCHFILES_FORCE_POLLING=true
    restart: unless-stopped
    networks: [mahnet]

  worker:
    build: ../../backend/worker
    container_name: mah_worker
    working_dir: /app
    volumes:
      - ../../backend/worker:/app:cached
    # command 지정하지 않음 → Dockerfile의 CMD(무한 루프) 사용
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - TZ=${TZ:-Asia/Seoul}
      - MYSQL_HOST=${MYSQL_HOST:-db}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-mah}
      - MYSQL_USER=${MYSQL_USER:-mah}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-mahpass}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    restart: unless-stopped
    networks: [mahnet]

  collector:
    build: ../../backend/collector
    container_name: mah_collector
    working_dir: /app
    volumes:
      - ../../backend/collector:/app:cached
    # command 지정하지 않음 → Dockerfile의 CMD(무한 루프) 사용
    depends_on:
      redis: { condition: service_healthy }
    environment:
      - TZ=${TZ:-Asia/Seoul}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    restart: unless-stopped
    networks: [mahnet]

  db:
    image: mysql:8.4
    container_name: mah_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpass}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-mah}
      - MYSQL_USER=${MYSQL_USER:-mah}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-mahpass}
    volumes:
      - db_data:/var/lib/mysql
      - ../../backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ../../backend/db/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [mahnet]

  redis:
    image: redis:7-alpine
    container_name: mah_redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ../../backend/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks: [mahnet]

volumes:
  db_data:
  redis_data:

networks:
  mahnet:
    driver: bridge
