name: mah

services:
  gateway:
    depends_on:
      api:
        condition: service_started
    env_file:
      - ./env/common.env
      - ./env/gateway.env
    restart: unless-stopped
    networks:
      - mahnet

  api:
    working_dir: /app
    command: ["/app/entrypoint.sh"]
    expose:
      - "8000"
    env_file:
      - ./env/common.env
      - ./env/api.env
    restart: unless-stopped
    networks:
      - mahnet

  worker:
    working_dir: /app
    entrypoint: ["sh", "/app/entrypoint.sh"]
    env_file:
      - ./env/common.env
      - ./env/worker.env
    restart: unless-stopped
    networks:
      - mahnet

  dispatcher:
    working_dir: /app
    entrypoint: ["sh", "/app/entrypoint.sh"]
    env_file:
      - ./env/common.env
      - ./env/dispatcher.env
    restart: unless-stopped
    networks:
      - mahnet

  scheduler:
    working_dir: /app
    entrypoint: ["sh", "/app/entrypoint.sh"]
    env_file:
      - ./env/common.env
      - ./env/scheduler.env
    restart: unless-stopped
    networks:
      - mahnet

  collector:
    working_dir: /app
    entrypoint: ["sh", "/app/entrypoint.sh"]
    env_file:
      - ./env/common.env
      - ./env/collector.env
    restart: unless-stopped
    networks:
      - mahnet

  stream_processor:
    working_dir: /app
    entrypoint: ["sh", "/app/entrypoint.sh"]
    env_file:
      - ./env/common.env
      - ./env/stream_processor.env
    restart: unless-stopped
    networks:
      - mahnet

networks:
  mahnet:
    driver: bridge