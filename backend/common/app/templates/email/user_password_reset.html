<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>[PricePing] 비밀번호 재설정</title>
</head>

<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:#f8f9fa;">
    <table width="100%" cellspacing="0" cellpadding="0">
        <tr>
            <td align="center">
                <table width="600" cellspacing="0" cellpadding="0"
                    style="max-width:600px;margin:20px auto;background:#ffffff;border-radius:8px;overflow:hidden;">

                    <!-- Header -->
                    <tr>
                        <td style="background:#1a73e8;color:#ffffff;padding:16px 24px;font-size:20px;font-weight:bold;">
                            PricePing
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding:24px;font-size:16px;line-height:1.5;color:#333;">
                            <p style="margin:0 0 12px 0;">
                                <strong>{{ user_name }}</strong>님 안녕하세요.
                            </p>

                            <p style="margin:0 0 12px 0;">
                                비밀번호 재설정 요청이 접수되었습니다.
                            </p>

                            <p style="margin:0 0 24px 0;">
                                아래 버튼을 클릭하여 새로운 비밀번호를 설정해 주세요.
                            </p>

                            <p style="text-align:center;margin:24px 0;">
                                <a href="{{ verify_link }}"
                                    style="background:#1a73e8;color:#ffffff;text-decoration:none;padding:12px 24px;border-radius:6px;display:inline-block;">
                                    비밀번호 재설정
                                </a>
                            </p>

                            <p style="margin:24px 0 0 0;font-size:14px;color:#666;">
                                ※ 본 메일은 {{ expiration_hours }}분 동안 유효합니다.
                            </p>

                            <p style="margin:12px 0 0 0;font-size:14px;color:#666;">
                                만약 본인이 요청하지 않았다면 이 메일을 무시하셔도 됩니다.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background:#f1f3f5;color:#666;font-size:12px;padding:12px 24px;text-align:center;">
                            본 메일은 PricePing 회원의 비밀번호 재설정 요청 시 발송됩니다.
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>

</html>
