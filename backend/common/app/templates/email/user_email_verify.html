<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[PricePing] 이메일 인증</title>
</head>
<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:#f8f9fa;">
  <table width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;margin:auto;background:#ffffff;border-radius:8px;overflow:hidden;">
    <tr>
      <td style="background:#1a73e8;color:#fff;padding:16px 24px;font-size:20px;font-weight:bold;">
        PricePing
      </td>
    </tr>
    <tr>
      <td style="padding:24px;font-size:16px;line-height:1.5;color:#333;">
        <p style="margin:0 0 12px 0;">안녕하세요, <strong>{{user_name}}</strong> 님!</p>
        <p style="margin:0 0 12px 0;">서비스 이용을 위해 이메일 주소 인증이 필요합니다.</p>
        <p style="margin:0 0 12px 0;">아래 버튼을 클릭하여 인증을 완료해 주세요.</p>
        <p style="text-align:center;margin-top:24px;">
          <a href="{{verify_link}}" style="background:#1a73e8;color:#fff;text-decoration:none;padding:12px 24px;border-radius:6px;display:inline-block;">이메일 인증하기</a>
        </p>
        <p style="margin:24px 0 0 0;font-size:14px;color:#666;">
          ※ 본 메일은 {{expiration_hours}}시간 동안만 유효합니다.
        </p>
      </td>
    </tr>
    <tr>
      <td style="background:#f1f3f5;color:#666;font-size:12px;padding:12px 24px;text-align:center;">
        본 메일은 PricePing의 회원가입 또는 이메일 변경 요청 시 발송되었습니다.
      </td>
    </tr>
  </table>
</body>
</html>
