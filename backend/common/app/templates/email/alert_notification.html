<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[PricePing] 시세 알림</title>
</head>
<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:#f8f9fa;">
  <table width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;margin:auto;background:#ffffff;border-radius:8px;overflow:hidden;">
    <tr>
      <td style="background:#1a73e8;color:#fff;padding:16px 24px;font-size:20px;font-weight:bold;">
        PricePing
      </td>
    </tr>
    <tr>
      <td style="padding:24px;font-size:16px;line-height:1.5;color:#333;">
        <p style="margin:0 0 12px 0;">안녕하세요, <strong>{{user_name}}</strong> 님!</p>
        <p style="margin:0 0 12px 0;">아래 조건에 맞는 시세 변동이 감지되었습니다.</p>
        <table style="width:100%;margin:16px 0;border-collapse:collapse;">
          <tr style="background:#f1f3f5;">
            <td style="padding:8px;font-weight:bold;">거래소</td>
            <td style="padding:8px;">{{exchange}}</td>
          </tr>
          <tr>
            <td style="padding:8px;font-weight:bold;">코인</td>
            <td style="padding:8px;">{{symbol}}</td>
          </tr>
          <tr style="background:#f1f3f5;">
            <td style="padding:8px;font-weight:bold;">조건</td>
            <td style="padding:8px;">{{condition}}</td>
          </tr>
          <tr>
            <td style="padding:8px;font-weight:bold;">현재가</td>
            <td style="padding:8px;">{{current_price}} {{currency}}</td>
          </tr>
        </table>
        <p style="margin:12px 0;">자세한 시세를 보려면 아래 버튼을 눌러주세요.</p>
        <p style="text-align:center;margin-top:24px;">
          <a href="{{alert_link}}" style="background:#1a73e8;color:#fff;text-decoration:none;padding:12px 24px;border-radius:6px;display:inline-block;">시세 확인하기</a>
        </p>
      </td>
    </tr>
    <tr>
      <td style="background:#f1f3f5;color:#666;font-size:12px;padding:12px 24px;text-align:center;">
        본 메일은 PricePing의 알림 설정에 따라 발송되었습니다.<br />
        알림 설정을 변경하거나 해제하려면 <a href="{{settings_link}}" style="color:#1a73e8;text-decoration:none;">여기</a>를 클릭하세요.
      </td>
    </tr>
  </table>
</body>
</html>
